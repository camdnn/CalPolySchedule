
name: CI

on:
  push:
    branches: ["**"]

jobs:
  frontend:
    name: Frontend — typecheck & build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: CalPolySchedule/EasyApps/frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: CalPolySchedule/EasyApps/frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build (typecheck + vite)
        run: npm run build

  backend:
    name: Backend — syntax check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: CalPolySchedule/EasyApps/backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Check syntax
        run: node --check server.js && node --check routes/schedule.js && node --check db/index.js
